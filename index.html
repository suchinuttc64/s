<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V9.2.1 - PRO EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Kanit', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .camera-container { position: relative; border-radius: 1.5rem; overflow: hidden; border: 2px solid #22d3ee; background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* ปรับปรุงขนาดปุ่มสลับกล้องให้ใหญ่ขึ้นอย่างเห็นได้ชัดและกดง่ายขึ้น */
        .btn-switch { position: absolute; top: 16px; right: 16px; z-index: 20; padding: 14px 20px; border-radius: 16px; background: rgba(15, 23, 42, 0.85); border: 2px solid rgba(34, 211, 238, 0.6); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-modern:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-3 flex flex-col min-h-screen max-w-xl mx-auto">
    
    <header class="mb-3 text-center">
        <h1 class="text-2xl font-black text-cyan-400 uppercase">Sentinel V9.2.1</h1>
        <div class="flex justify-center items-center gap-2 mt-1">
            <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></span>
            <p id="status" class="text-sm font-bold text-slate-300">Loading AI...</p>
        </div>
    </header>

    <main class="space-y-3">
        <div class="camera-container aspect-square md:aspect-video">
            <button onclick="switchCamera()" class="btn-switch flex items-center gap-2 text-cyan-400 font-extrabold text-sm tracking-wide">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
                <span>สลับกล้อง</span>
            </button>
            <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div id="room-warning" class="absolute inset-0 flex items-center justify-center bg-black/80 z-10 text-center p-4">
                <p class="text-lg font-bold text-white">📍 เลือกห้องเรียนเพื่อเริ่มระบบ</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div class="glass p-3 rounded-2xl border-l-4 border-cyan-500">
                <p class="text-[10px] font-bold text-slate-400">SUBJECT</p>
                <p id="currentSubject" class="text-sm font-black text-white truncate">-</p>
            </div>
            <div class="glass p-3 rounded-2xl border-l-4 border-yellow-500 text-right">
                <p class="text-[10px] font-bold text-slate-400">PRESENT</p>
                <p id="queueCount" class="text-2xl font-black text-yellow-400">0</p>
            </div>
        </div>

        <div class="space-y-3">
            <select id="roomSelect" onchange="loadSpecificRoom()" class="w-full glass p-3 rounded-xl text-cyan-400 text-lg font-black text-center outline-none border border-white/10">
                <option value="" class="bg-slate-900">📂 คลิกเลือกห้องเรียน</option>
            </select>

            <div id="activeControls" class="hidden flex gap-2">
                <button onclick="openReg()" class="flex-1 py-4 bg-red-600 text-white font-black text-xs rounded-xl btn-modern">📸 ลงทะเบียนใบหน้า</button>
                <button onclick="syncAttendance()" id="syncBtn" class="flex-[1.5] bg-gradient-to-r from-blue-600 to-cyan-500 py-4 rounded-xl font-black text-xs text-white btn-modern uppercase">✅ บันทึกชื่อเข้าเรียน</button>
            </div>
        </div>
    </main>

    <div id="regModal" class="fixed inset-0 z-50 hidden place-items-center p-6 bg-black/90">
        <div class="glass p-6 rounded-[2rem] w-full max-w-sm border border-white/10">
            <h2 class="text-xl font-black mb-4 text-white text-center underline">ลงทะเบียนใหม่</h2>
            <select id="regStudent" class="w-full glass p-3 rounded-xl mb-6 text-sm bg-slate-800 font-bold text-white outline-none"></select>
            <button id="saveBtn" onclick="doRegister()" class="w-full bg-cyan-500 py-4 rounded-xl font-black text-lg mb-3 text-white">บันทึกอัตลักษณ์</button>
            <button onclick="document.getElementById('regModal').style.display='none'" class="w-full text-slate-400 text-sm font-bold">ยกเลิก</button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGZzvvyXUuh8JQpVal4nivlAL4xqqUnD3ov1ZVNEf0Xs5KfVoBTYyq-myCxaRWh3lZ/exec"; 
        const API_KEY = "JUMJIM_SECURE_KEY_2024";

        let studentList = [], faceData = [], syncQueue = [], alreadyCheckedID = new Set();
        let currentFacingMode = 'user', currentStream = null, currentEndTime = 0;
        let isSpeaking = false; // ตัวแปรล็อกคิวเสียงพูดเพื่อแก้ปัญหาระบบพูดไม่หยุด

        async function init() {
            updateStatus("AI Loading...", "bg-yellow-500");
            const MODEL_URL = "https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights";
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                await startVideo();
                loadInitialData();
            } catch(e) { updateStatus("Error", "bg-red-500"); }
        }

        async function startVideo() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
                document.getElementById('video').srcObject = currentStream;
                document.getElementById('video').onloadedmetadata = () => {
                    faceapi.matchDimensions(document.getElementById('overlay'), { width: video.videoWidth, height: video.videoHeight });
                    detectLoop();
                };
            } catch(e) { alert("กล้องไม่ทำงาน"); }
        }

        async function detectLoop() {
            const video = document.getElementById('video'), overlay = document.getElementById('overlay'), ctx = overlay.getContext('2d');
            const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 });
            
            setInterval(async () => {
                if (!document.getElementById('roomSelect').value || video.paused) { ctx.clearRect(0, 0, overlay.width, overlay.height); return; }
                
                const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
                if (nowMins > currentEndTime) { alreadyCheckedID.clear(); }

                const detections = await faceapi.detectAllFaces(video, options).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, { width: video.videoWidth, height: video.videoHeight });
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                resized.forEach(det => {
                    let best = { dist: 0.35, s: null }; 
                    faceData.forEach(f => {
                        const d = faceapi.euclideanDistance(det.descriptor, new Float32Array(f.descriptor));
                        if (d < best.dist) best = { dist: d, s: studentList.find(x => x.student_id == f.student_id) };
                    });

                    const { x, y, width, height } = det.detection.box;
                    if (best.s) {
                        if (alreadyCheckedID.has(best.s.student_id)) {
                            drawBox(ctx, x, y, width, height, '#f59e0b', "CHECKED", 4);
                        } else {
                            drawBox(ctx, x, y, width, height, '#22d3ee', best.s.name, 6);
                            syncQueue.push(best.s);
                            alreadyCheckedID.add(best.s.student_id);
                            document.getElementById('queueCount').innerText = syncQueue.length;
                            handleGreeting(best.s.name);
                        }
                    } else { drawBox(ctx, x, y, width, height, '#ef4444', "NEW FACE", 2, true); }
                });
            }, 600);
        }

        function handleGreeting(name) {
            // ถ้าระบบกำลังพูดประโยคก่อนหน้าอยู่ ให้ข้ามไปก่อนเพื่อป้องกันการพูดทับซ้อนและพูดไม่หยุด
            if (isSpeaking) return; 
            
            isSpeaking = true;
            const hr = new Date().getHours();
            let greet = (hr < 12) ? "อรุณสวัสดิ์ครับ " : (hr < 16) ? "สวัสดีตอนบ่ายครับ " : "สวัสดีตอนเย็นครับ ";
            speak(greet + name, () => {
                // คืนค่าล็อกเสียงหลังจากส่งเสียงเสร็จเรียบร้อยแล้วภายใน 1.5 วินาที
                setTimeout(() => { isSpeaking = false; }, 1500);
            });
        }

        function drawBox(ctx, x, y, w, h, color, text, lw, dash=false) {
            ctx.strokeStyle = color; ctx.lineWidth = lw;
            if(dash) ctx.setLineDash([10, 10]); else ctx.setLineDash([]);
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = color; ctx.font = 'bold 16px Kanit';
            ctx.fillText(text, x, y - 8);
        }

        async function loadInitialData() {
            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_initial_data`).then(r => r.json());
                res.rooms.forEach(r => {
                    const opt = document.createElement('option'); opt.value = r; opt.text = "📍 ห้อง " + r;
                    document.getElementById('roomSelect').appendChild(opt);
                });
                updateStatus("READY", "bg-green-500");
            } catch(e) { updateStatus("Offline", "bg-red-500"); }
        }

        async function loadSpecificRoom() {
            const room = document.getElementById('roomSelect').value;
            if(!room) return;
            alreadyCheckedID.clear(); syncQueue = []; 
            document.getElementById('queueCount').innerText = "0";
            document.getElementById('room-warning').style.display = 'none';
            document.getElementById('activeControls').classList.remove('hidden');
            updateStatus("Syncing...", "bg-cyan-500");
            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_room_data&room=${encodeURIComponent(room)}`).then(r => r.json());
                studentList = res.studentList || [];
                faceData = res.faceData || [];
                currentEndTime = res.schedule.endTime || 0;
                document.getElementById('currentSubject').innerText = res.schedule.subject || "นอกเวลาเรียน";
                
                const regSel = document.getElementById('regStudent');
                regSel.innerHTML = '<option value="">-- เลือกชื่อนักเรียน --</option>';
                studentList.forEach(s => {
                    const opt = document.createElement('option'); opt.value = s.student_id; opt.text = s.name;
                    regSel.appendChild(opt);
                });
                updateStatus(`Room ${room}`, "bg-green-500");
            } catch(e) { updateStatus("Error", "bg-red-500"); }
        }

        async function syncAttendance() {
            if (syncQueue.length === 0) return;
            const btn = document.getElementById('syncBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ api_key: API_KEY, action: 'attendance_sync', records: syncQueue })});
                syncQueue = [];
                document.getElementById('queueCount').innerText = "0";
                btn.innerText = "✅ บันทึกชื่อเข้าเรียน"; btn.disabled = false;
                speak("บันทึกข้อมูลเรียบร้อย", () => {});
            } catch(e) { alert("Error!"); btn.disabled = false; }
        }

        function speak(t, callback) { 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'th-TH'; 
            u.onend = callback; // เมื่อพูดจบ ค่อยเรียก callback ฟังก์ชันทำงานต่อ
            u.onerror = callback;
            window.speechSynthesis.speak(u); 
        }
        
        function updateStatus(t, c) { document.getElementById('status').innerText = t; document.getElementById('status-dot').className = `w-2.5 h-2.5 rounded-full animate-pulse ${c}`; }
        function switchCamera() { currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user'; startVideo(); }
        function openReg() { document.getElementById('regModal').style.display='grid'; }

        async function doRegister() {
            const btn = document.getElementById('saveBtn'), id = document.getElementById('regStudent').value;
            if(!id) return;
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const d = await faceapi.detectSingleFace(document.getElementById('video'), new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if(!d) { alert("ไม่พบใบหน้า"); btn.disabled = false; return; }
                await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ api_key: API_KEY, action: 'register_face', student_id: id, descriptor: Array.from(d.descriptor) })});
                alert("บันทึกสำเร็จ");
                loadSpecificRoom();
                document.getElementById('regModal').style.display='none';
            } catch (e) { alert("ล้มเหลว"); } finally { btn.disabled = false; btn.innerText = "บันทึกอัตลักษณ์"; }
        }

        init();
    </script>
</body>
</html>
