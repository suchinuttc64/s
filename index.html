<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V9 - ADVANCED CHECK</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .camera-container { position: relative; border-radius: 2rem; overflow: hidden; border: 3px solid rgba(34, 211, 238, 0.3); background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-modern:active { transform: scale(0.92); transition: 0.2s; }
        .btn-switch-in-frame { position: absolute; top: 1rem; right: 1rem; z-index: 20; background: rgba(0, 0, 0, 0.5); }
        @keyframes pulse-warning { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        .alert-warning { animation: pulse-warning 1.5s infinite; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen max-w-xl mx-auto">
    
    <header class="mb-6 text-center">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">SENTINEL V9</h1>
        <div class="flex justify-center items-center gap-2 mt-1">
            <span id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></span>
            <p id="status" class="text-lg font-medium text-slate-300">เตรียมระบบ...</p>
        </div>
    </header>

    <main class="flex-grow space-y-6">
        <div class="camera-container aspect-square md:aspect-video" id="cam-box">
            <button onclick="switchCamera()" class="p-4 glass rounded-2xl text-cyan-400 btn-modern btn-switch-in-frame">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
            </button>
            <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div id="room-warning" class="absolute inset-0 flex items-center justify-center bg-black/70 z-10 text-center p-4">
                <p class="text-2xl font-bold text-white">📍 กรุณาเลือกห้องเรียน</p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div class="glass p-2 rounded-2xl border-2 border-cyan-500/50">
                <select id="roomSelect" onchange="loadSpecificRoom()" class="w-full bg-transparent p-4 rounded-xl outline-none text-cyan-100 text-xl font-bold appearance-none cursor-pointer">
                    <option value="" class="bg-slate-900">📂 คลิกเลือกห้องเรียน...</option>
                </select>
            </div>

            <div id="activeControls" class="hidden space-y-4">
                <div class="glass p-4 rounded-2xl border-l-8 border-cyan-500 flex justify-between items-center">
                    <div>
                        <p class="text-sm text-slate-400 font-bold uppercase">วิชาที่กำลังสอน</p>
                        <p id="currentSubject" class="text-xl font-black text-white">-</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-slate-400 font-bold">ในคิว</p>
                        <span id="queueCount" class="text-4xl font-black text-cyan-400">0</span>
                    </div>
                </div>
                <button onclick="syncAttendance()" id="syncBtn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 py-5 rounded-2xl font-black text-2xl btn-modern shadow-lg">บันทึกข้อมูลเข้าเซิร์ฟเวอร์</button>
            </div>
        </div>
    </main>

    <script>
        const APPS_SCRIPT_URL = "ใส่_URL_ของคุณที่นี่"; 
        const API_KEY = "JUMJIM_SECURE_KEY_2024";

        let studentList = [];
        let faceData = [];
        let syncQueue = [];
        let alreadyCheckedID = new Set(); // เก็บ ID ที่เช็คไปแล้วในเซสชันนี้
        let currentSubject = "";
        let currentFacingMode = 'user';
        let currentStream = null;

        async function init() {
            updateStatus("กำลังโหลด AI...", "bg-yellow-500");
            const MODEL_URL = "https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights";
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            await startVideo();
            loadInitialData();
        }

        async function startVideo() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const video = document.getElementById('video');
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            video.srcObject = currentStream;
            video.onloadedmetadata = () => {
                faceapi.matchDimensions(document.getElementById('overlay'), { width: video.videoWidth, height: video.videoHeight });
                detectLoop();
            };
        }

        async function detectLoop() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const ctx = overlay.getContext('2d');
            
            setInterval(async () => {
                if (!document.getElementById('roomSelect').value || video.paused) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, { width: video.videoWidth, height: video.videoHeight });
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                resized.forEach(det => {
                    let best = { dist: 0.45, s: null };
                    faceData.forEach(f => {
                        const d = faceapi.euclideanDistance(det.descriptor, new Float32Array(f.descriptor));
                        if (d < best.dist) best = { dist: d, s: studentList.find(x => x.student_id == f.student_id) };
                    });

                    const { x, y, width, height } = det.detection.box;
                    
                    if (best.s) {
                        // 1. ตรวจสอบเวลาเรียน
                        if (currentSubject === "นอกเวลาเรียน") {
                            drawBox(ctx, x, y, width, height, '#ef4444', "ยังไม่ถึงเวลาเรียน", 6);
                            // พูดเตือน (Optional: ใส่ debounce ป้องกันเสียงรัว)
                        } 
                        // 2. ตรวจสอบการเช็คซ้ำ
                        else if (alreadyCheckedID.has(best.s.student_id)) {
                            drawBox(ctx, x, y, width, height, '#f59e0b', "เช็คชื่อไปแล้ว", 6);
                            // สั่งให้พูดว่าเช็คชื่อไปแล้ว (เฉพาะครั้งแรกที่เจอใน Loop)
                        } 
                        // 3. เช็คชื่อใหม่
                        else {
                            drawBox(ctx, x, y, width, height, '#22d3ee', best.s.name, 6);
                            syncQueue.push(best.s);
                            alreadyCheckedID.add(best.s.student_id); // บันทึกว่าเช็คแล้ว
                            document.getElementById('queueCount').innerText = syncQueue.length;
                            speak(best.s.name);
                        }
                    } else {
                        drawBox(ctx, x, y, width, height, '#ef4444', "ไม่พบข้อมูล", 2, true);
                    }
                });
            }, 700);
        }

        function drawBox(ctx, x, y, w, h, color, text, lw, dash=false) {
            ctx.strokeStyle = color; ctx.lineWidth = lw;
            if(dash) ctx.setLineDash([5, 5]); else ctx.setLineDash([]);
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = color; ctx.font = 'bold 20px Kanit';
            ctx.fillText(text, x, y - 10);
        }

        async function loadInitialData() {
            const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_initial_data`).then(r => r.json());
            const sel = document.getElementById('roomSelect');
            res.rooms.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; opt.text = "📍 ห้อง " + r;
                sel.appendChild(opt);
            });
            updateStatus("ระบบพร้อม", "bg-green-500");
        }

        async function loadSpecificRoom() {
            const room = document.getElementById('roomSelect').value;
            if(!room) return;
            document.getElementById('room-warning').style.display = 'none';
            updateStatus("กำลังซิงค์ข้อมูล...", "bg-cyan-500");
            const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_room_data&room=${encodeURIComponent(room)}`).then(r => r.json());
            studentList = res.studentList;
            faceData = res.faceData;
            currentSubject = res.schedule.subject; // ดึงข้อมูลวิชาจาก Backend
            
            document.getElementById('currentSubject').innerText = currentSubject;
            document.getElementById('activeControls').classList.remove('hidden');
            updateStatus(`ห้อง ${room} : ${currentSubject}`, "bg-green-500");

            if (currentSubject === "นอกเวลาเรียน") {
                speak("ขณะนี้ยังไม่ถึงเวลาเรียนค่ะ");
            }
        }

        async function syncAttendance() {
            if (syncQueue.length === 0) return;
            const btn = document.getElementById('syncBtn');
            btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
            await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ api_key: API_KEY, action: 'attendance_sync', records: syncQueue })});
            syncQueue = [];
            document.getElementById('queueCount').innerText = "0";
            btn.innerText = "บันทึกข้อมูลเข้าเซิร์ฟเวอร์"; btn.disabled = false;
            speak("บันทึกข้อมูลสำเร็จ");
        }

        function speak(t) {
            let msg = t;
            if (alreadyCheckedID.has(t)) { // ถ้าเป็นชื่อที่มีใน List แล้ว (ID)
                 // Logic การเช็คชื่อซ้ำจะถูกเรียกจาก detectLoop
                 // ผมปรับ Logic เสียงพูดใน detectLoop ให้เหมาะสมกว่าครับ
            }
            const utterance = new SpeechSynthesisUtterance(t);
            utterance.lang = 'th-TH';
            window.speechSynthesis.speak(utterance);
        }

        // ปรับปรุงฟังก์ชันพูดพิเศษสำหรับการเช็คซ้ำ
        function speakDuplicate(name) {
            if (!window.speechSynthesis.speaking) {
                const m = new SpeechSynthesisUtterance(name + " เช็คชื่อไปแล้วค่ะ");
                m.lang = 'th-TH';
                window.speechSynthesis.speak(m);
            }
        }

        function updateStatus(t, c) { document.getElementById('status').innerText = t; document.getElementById('status-dot').className = `w-3 h-3 rounded-full animate-pulse ${c}`; }
        function switchCamera() { currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user'; startVideo(); }

        init();
    </script>
</body>
</html>
