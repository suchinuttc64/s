<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V9 - FIXED UI</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .camera-container { position: relative; border-radius: 1.5rem; overflow: hidden; border: 3px solid #22d3ee; background: #000; box-shadow: 0 0 25px rgba(34, 211, 238, 0.2); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-modern { transition: all 0.2s ease; border-bottom: 5px solid rgba(0,0,0,0.3); }
        .btn-modern:active { transform: translateY(3px); border-bottom-width: 2px; }
        
        /* 2. จัดตำแหน่งปุ่มสลับกล้องในเฟรม */
        .btn-switch-in-frame {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid white;
        }
    </style>
</head>
<body class="p-3 flex flex-col min-h-screen max-w-xl mx-auto">
    
    <header class="mb-3 text-center">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 uppercase tracking-tighter">Sentinel V9</h1>
        <div class="flex justify-center items-center gap-2 mt-1">
            <span id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></span>
            <p id="status" class="text-lg font-bold text-slate-300">เตรียมระบบ...</p>
        </div>
    </header>

    <main class="flex-grow space-y-3">
        <div class="camera-container aspect-square md:aspect-video" id="cam-box">
            <button onclick="switchCamera()" class="p-3 glass rounded-xl text-white btn-modern btn-switch-in-frame">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
            </button>
            
            <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div id="room-warning" class="absolute inset-0 flex items-center justify-center bg-black/80 z-10 text-center p-4">
                <p class="text-xl font-bold text-white">📍 กรุณาเลือกห้องเรียน</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div class="glass p-3 rounded-2xl border-l-6 border-cyan-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">วิชาเรียน</p>
                <p id="currentSubject" class="text-base font-black text-white truncate">-</p>
            </div>
            <div class="glass p-3 rounded-2xl border-l-6 border-yellow-500 text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase">สแกนแล้ว</p>
                <p id="queueCount" class="text-3xl font-black text-yellow-400">0</p>
            </div>
        </div>

        <div class="space-y-3">
            <div class="glass p-1 rounded-xl border-2 border-white/20">
                <select id="roomSelect" onchange="loadSpecificRoom()" class="w-full bg-transparent p-3 outline-none text-cyan-400 text-xl font-black text-center appearance-none cursor-pointer">
                    <option value="" class="bg-slate-900">📂 คลิกเลือกห้องเรียน</option>
                </select>
            </div>

            <div class="flex flex-row gap-2">
                <button id="regTriggerBtn" onclick="openReg()" class="flex-1 py-4 bg-red-600 text-white font-black text-lg rounded-2xl shadow-lg btn-modern">
                    📸 ลงทะเบียนใหม่
                </button>

                <button id="syncBtn" onclick="syncAttendance()" class="flex-1 bg-gradient-to-r from-blue-600 to-cyan-500 py-4 rounded-2xl font-black text-lg shadow-xl btn-modern">
                    ✅ บันทึกรายชื่อ
                </button>
            </div>
        </div>
    </main>

    <div id="regModal" class="fixed inset-0 z-50 hidden place-items-center p-6 bg-black/95 backdrop-blur-md">
        <div class="glass p-6 rounded-[2rem] w-full max-w-sm border-2 border-white/20">
            <h2 class="text-2xl font-black mb-4 text-white text-center">ลงทะเบียนใหม่</h2>
            <select id="regStudent" class="w-full glass p-4 rounded-xl mb-6 text-lg bg-slate-800 font-bold text-white outline-none"></select>
            <button id="saveBtn" onclick="doRegister()" class="w-full bg-cyan-500 py-4 rounded-xl font-black text-xl mb-3 btn-modern text-white shadow-lg">บันทึกรูป</button>
            <button onclick="document.getElementById('regModal').style.display='none'" class="w-full text-slate-400 text-lg font-bold py-1">ยกเลิก</button>
        </div>
    </div>

    <script>
        // *** ห้ามแก้ไขโครงสร้างหลัก ***
        const APPS_SCRIPT_URL = "URL_ที่ได้จากการ_DEPLOY_ของคุณ"; 
        const API_KEY = "JUMJIM_SECURE_KEY_2024";

        let studentList = [];
        let faceData = [];
        let syncQueue = [];
        let alreadyCheckedID = new Set();
        let currentSubject = "";
        let currentFacingMode = 'user';
        let currentStream = null; // เก็บ stream ปัจจุบัน

        async function init() {
            updateStatus("โหลดระบบ AI...", "bg-yellow-500");
            const MODEL_URL = "https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights";
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                await startVideo();
                loadInitialData();
            } catch(e) { updateStatus("โหลดผิดพลาด", "bg-red-500"); }
        }

        async function startVideo() {
            // 1. ปิดกล้องตัวเก่าก่อน (Stop Tracks) เพื่อให้เปิดกล้องใหม่ได้
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const video = document.getElementById('video');
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode } 
                });
                video.srcObject = currentStream;
                video.onloadedmetadata = () => {
                    const overlay = document.getElementById('overlay');
                    faceapi.matchDimensions(overlay, { width: video.videoWidth, height: video.videoHeight });
                    detectLoop();
                };
            } catch(e) { alert("ไม่สามารถเข้าถึงกล้องได้: " + e); }
        }

        async function detectLoop() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const ctx = overlay.getContext('2d');
            
            setInterval(async () => {
                const roomSelected = document.getElementById('roomSelect').value;
                if (!roomSelected || video.paused || video.ended) {
                    ctx.clearRect(0, 0, overlay.width, overlay.height);
                    return;
                }

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, { width: video.videoWidth, height: video.videoHeight });
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                resized.forEach(det => {
                    let best = { dist: 0.45, s: null };
                    faceData.forEach(f => {
                        const d = faceapi.euclideanDistance(det.descriptor, new Float32Array(f.descriptor));
                        if (d < best.dist) best = { dist: d, s: studentList.find(x => x.student_id == f.student_id) };
                    });

                    const { x, y, width, height } = det.detection.box;
                    
                    if (best.s) {
                        if (alreadyCheckedID.has(best.s.student_id)) {
                            drawBox(ctx, x, y, width, height, '#f59e0b', "บันทึกแล้ว", 5);
                        } else {
                            // 4. ปรับขนาดตัวหนังสือชื่อในเฟรมให้สมดุล
                            drawBox(ctx, x, y, width, height, '#22d3ee', best.s.name, 8);
                            syncQueue.push(best.s);
                            alreadyCheckedID.add(best.s.student_id);
                            document.getElementById('queueCount').innerText = syncQueue.length;
                            speak(best.s.name);
                        }
                    } else {
                        drawBox(ctx, x, y, width, height, '#ef4444', "ไม่พบข้อมูล", 3, true);
                    }
                });
            }, 700);
        }

        function drawBox(ctx, x, y, w, h, color, text, lw, dash=false) {
            ctx.strokeStyle = color; ctx.lineWidth = lw;
            if(dash) ctx.setLineDash([10, 10]); else ctx.setLineDash([]);
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = color; ctx.font = 'bold 20px Kanit';
            ctx.fillText(text, x, y - 10);
        }

        async function loadInitialData() {
            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_initial_data`).then(r => r.json());
                const sel = document.getElementById('roomSelect');
                res.rooms.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r; opt.text = "📍 ห้อง " + r;
                    sel.appendChild(opt);
                });
                updateStatus("พร้อมใช้งาน", "bg-green-500");
            } catch(e) { updateStatus("เชื่อมต่อไม่ได้", "bg-red-500"); }
        }

        async function loadSpecificRoom() {
            const room = document.getElementById('roomSelect').value;
            if(!room) return;
            document.getElementById('room-warning').style.display = 'none';
            updateStatus("โหลดชื่อนักเรียน...", "bg-cyan-500");
            const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_room_data&room=${encodeURIComponent(room)}`).then(r => r.json());
            studentList = res.studentList;
            faceData = res.faceData;
            currentSubject = res.schedule.subject;
            document.getElementById('currentSubject').innerText = currentSubject;
            
            const regSel = document.getElementById('regStudent');
            regSel.innerHTML = '';
            studentList.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.student_id; opt.text = s.name;
                regSel.appendChild(opt);
            });
            updateStatus(`กำลังสแกน: ห้อง ${room}`, "bg-green-500");
        }

        async function syncAttendance() {
            if (syncQueue.length === 0) { alert("ไม่มีข้อมูลในคิว"); return; }
            const btn = document.getElementById('syncBtn');
            btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ api_key: API_KEY, action: 'attendance_sync', records: syncQueue })});
                syncQueue = [];
                document.getElementById('queueCount').innerText = "0";
                btn.innerText = "✅ บันทึกรายชื่อ"; btn.disabled = false;
                speak("บันทึกสำเร็จ");
            } catch(e) { alert("เกิดข้อผิดพลาด"); btn.disabled = false; btn.innerText = "✅ บันทึกรายชื่อ"; }
        }

        function speak(t) {
            const utterance = new SpeechSynthesisUtterance(t);
            utterance.lang = 'th-TH';
            window.speechSynthesis.speak(utterance);
        }

        function updateStatus(t, c) { document.getElementById('status').innerText = t; document.getElementById('status-dot').className = `w-3 h-3 rounded-full animate-pulse ${c}`; }
        
        // 1. แก้ไขฟังก์ชันสลับกล้องให้เสถียรขึ้น
        function switchCamera() { 
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user'; 
            startVideo(); // เรียก startVideo ใหม่เพื่อ Re-stream กล้อง
        }

        function openReg() { document.getElementById('regModal').style.display='grid'; }

        async function doRegister() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            const id = document.getElementById('regStudent').value;
            const video = document.getElementById('video');
            try {
                const d = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if(!d) { alert("ไม่พบใบหน้า"); btn.disabled = false; btn.innerText = "บันทึกรูป"; return; }
                await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ api_key: API_KEY, action: 'register_face', student_id: id, descriptor: Array.from(d.descriptor) })});
                alert("ลงทะเบียนสำเร็จ");
                loadSpecificRoom();
                document.getElementById('regModal').style.display='none';
            } catch (e) { alert("ล้มเหลว"); } finally { btn.disabled = false; btn.innerText = "บันทึกรูป"; }
        }

        init();
    </script>
</body>
</html>
