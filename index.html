<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V9 - FIXED REGISTER LIST</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Kanit', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .camera-container { position: relative; border-radius: 2rem; overflow: hidden; border: 4px solid #22d3ee; background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-modern { transition: all 0.2s ease; border-bottom: 6px solid rgba(0,0,0,0.3); }
        .btn-modern:active { transform: translateY(4px); border-bottom-width: 2px; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen max-w-xl mx-auto">
    
    <header class="mb-4 text-center">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Sentinel V9</h1>
        <div class="flex justify-center items-center gap-2 mt-1">
            <span id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></span>
            <p id="status" class="text-xl font-bold text-slate-300">เตรียมระบบ...</p>
        </div>
    </header>

    <main class="flex-grow space-y-4">
        <div class="camera-container aspect-square md:aspect-video">
            <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div id="room-warning" class="absolute inset-0 flex items-center justify-center bg-black/80 z-10 text-center p-4">
                <p class="text-2xl font-bold text-white">📍 กรุณาเลือกห้องเรียนด้านล่าง</p>
            </div>
        </div>

        <div class="glass p-4 rounded-3xl border-l-8 border-cyan-500 flex justify-between items-center shadow-lg">
            <div class="flex-1">
                <p class="text-xs font-bold text-slate-400">วิชาที่กำลังสอน</p>
                <p id="currentSubject" class="text-2xl font-black text-white truncate">กรุณาเลือกห้อง</p>
            </div>
            <div class="text-right ml-4">
                <p class="text-xs font-bold text-slate-400">มาเรียนแล้ว</p>
                <p id="queueCount" class="text-4xl font-black text-yellow-400">0</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="glass p-1 rounded-2xl border-2 border-cyan-500/50">
                <select id="roomSelect" onchange="loadSpecificRoom()" class="w-full bg-transparent p-5 outline-none text-cyan-400 text-2xl font-black text-center appearance-none cursor-pointer">
                    <option value="" class="bg-slate-900">📂 คลิกเพื่อเลือกห้องเรียน</option>
                </select>
            </div>

            <div id="controlPanel" class="hidden space-y-4">
                <button onclick="openReg()" class="w-full py-5 bg-red-600 text-white font-black text-2xl rounded-3xl shadow-lg btn-modern">
                    📸 ลงทะเบียนใบหน้าใหม่
                </button>
                <button onclick="syncAttendance()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 py-7 rounded-3xl font-black text-3xl shadow-xl btn-modern">
                    ✅ บันทึกชื่อเข้าเรียน
                </button>
            </div>
        </div>
    </main>

    <div id="regModal" class="fixed inset-0 z-50 hidden place-items-center p-6 bg-black/95 backdrop-blur-md">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm border-2 border-white/20">
            <h2 class="text-3xl font-black mb-2 text-white text-center">ลงทะเบียน</h2>
            <p class="text-center text-slate-400 mb-6">ค้นหาชื่อจากห้องที่เลือกไว้</p>
            
            <select id="regStudent" class="w-full glass p-5 rounded-2xl mb-8 text-xl bg-slate-800 font-bold text-white outline-none">
                <option value="">-- เลือกรายชื่อนักเรียน --</option>
            </select>

            <button id="saveBtn" onclick="doRegister()" class="w-full bg-cyan-500 py-5 rounded-2xl font-black text-2xl mb-4 btn-modern text-white shadow-lg">บันทึกอัตลักษณ์</button>
            <button onclick="document.getElementById('regModal').style.display='none'" class="w-full text-slate-400 text-xl font-bold py-2">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGZzvvyXUuh8JQpVal4nivlAL4xqqUnD3ov1ZVNEf0Xs5KfVoBTYyq-myCxaRWh3lZ/exec"; 
        const API_KEY = "JUMJIM_SECURE_KEY_2024";

        let studentList = [];
        let faceData = [];
        let syncQueue = [];
        let alreadyCheckedID = new Set();
        let currentFacingMode = 'user';
        let currentStream = null;

        async function init() {
            updateStatus("โหลดระบบ AI...", "bg-yellow-500");
            const MODEL_URL = "https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights";
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            await startVideo();
            loadInitialData();
        }

        async function startVideo() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const video = document.getElementById('video');
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            video.srcObject = currentStream;
            video.onloadedmetadata = () => {
                faceapi.matchDimensions(document.getElementById('overlay'), { width: video.videoWidth, height: video.videoHeight });
                detectLoop();
            };
        }

        async function detectLoop() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const ctx = overlay.getContext('2d');
            setInterval(async () => {
                if (!document.getElementById('roomSelect').value || video.paused) return;
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, { width: video.videoWidth, height: video.videoHeight });
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                resized.forEach(det => {
                    let best = { dist: 0.45, s: null };
                    faceData.forEach(f => {
                        const d = faceapi.euclideanDistance(det.descriptor, new Float32Array(f.descriptor));
                        if (d < best.dist) best = { dist: d, s: studentList.find(x => x.student_id == f.student_id) };
                    });
                    const { x, y, width, height } = det.detection.box;
                    if (best.s) {
                        if (alreadyCheckedID.has(best.s.student_id)) {
                            drawBox(ctx, x, y, width, height, '#f59e0b', "บันทึกแล้ว", 6);
                        } else {
                            drawBox(ctx, x, y, width, height, '#22d3ee', best.s.name, 10);
                            syncQueue.push(best.s);
                            alreadyCheckedID.add(best.s.student_id);
                            document.getElementById('queueCount').innerText = syncQueue.length;
                            speak(best.s.name);
                        }
                    } else {
                        drawBox(ctx, x, y, width, height, '#ef4444', "หน้าใหม่", 4, true);
                    }
                });
            }, 700);
        }

        function drawBox(ctx, x, y, w, h, color, text, lw, dash=false) {
            ctx.strokeStyle = color; ctx.lineWidth = lw;
            if(dash) ctx.setLineDash([10, 10]); else ctx.setLineDash([]);
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = color; ctx.font = 'bold 28px Kanit';
            ctx.fillText(text, x, y - 15);
        }

        async function loadInitialData() {
            const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_initial_data`).then(r => r.json());
            const sel = document.getElementById('roomSelect');
            res.rooms.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; opt.text = "📍 ห้อง " + r;
                sel.appendChild(opt);
            });
            updateStatus("พร้อมใช้งาน", "bg-green-500");
        }

        async function loadSpecificRoom() {
            const room = document.getElementById('roomSelect').value;
            if(!room) return;
            document.getElementById('room-warning').style.display = 'none';
            document.getElementById('controlPanel').classList.remove('hidden');
            updateStatus("ซิงค์รายชื่อ...", "bg-cyan-500");
            
            const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_room_data&room=${encodeURIComponent(room)}`).then(r => r.json());
            studentList = res.studentList;
            faceData = res.faceData;
            document.getElementById('currentSubject').innerText = res.schedule.subject;

            // อัปเดตรายชื่อลงในหน้าต่างลงทะเบียนทันที
            const regSel = document.getElementById('regStudent');
            regSel.innerHTML = '<option value="">-- เลือกนักเรียน --</option>';
            studentList.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.student_id;
                opt.text = s.name;
                regSel.appendChild(opt);
            });
            updateStatus(`ห้อง ${room}`, "bg-green-500");
        }

        async function syncAttendance() {
            if (syncQueue.length === 0) return;
            await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ api_key: API_KEY, action: 'attendance_sync', records: syncQueue })});
            syncQueue = [];
            document.getElementById('queueCount').innerText = "0";
            speak("บันทึกสำเร็จ");
        }

        function speak(t) {
            const utterance = new SpeechSynthesisUtterance(t);
            utterance.lang = 'th-TH';
            window.speechSynthesis.speak(utterance);
        }

        function updateStatus(t, c) { document.getElementById('status').innerText = t; document.getElementById('status-dot').className = `w-3 h-3 rounded-full animate-pulse ${c}`; }
        function openReg() { document.getElementById('regModal').style.display='grid'; }

        async function doRegister() {
            const btn = document.getElementById('saveBtn');
            const id = document.getElementById('regStudent').value;
            if(!id) { alert("กรุณาเลือกรายชื่อก่อน!"); return; }
            btn.disabled = true; btn.innerText = "กำลังถ่ายรูป...";
            const video = document.getElementById('video');
            const d = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(!d) { alert("ไม่พบใบหน้า"); btn.disabled = false; btn.innerText = "บันทึกอัตลักษณ์"; return; }
            await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ api_key: API_KEY, action: 'register_face', student_id: id, descriptor: Array.from(d.descriptor) })});
            alert("บันทึกสำเร็จ");
            loadSpecificRoom();
            document.getElementById('regModal').style.display='none';
            btn.disabled = false; btn.innerText = "บันทึกอัตลักษณ์";
        }

        init();
    </script>
</body>
</html>
