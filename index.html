<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V9 ENTERPRISE</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Futuristic Glass Effect */
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        /* Camera Frame */
        .camera-container {
            position: relative;
            border-radius: 2rem;
            overflow: hidden;
            border: 2px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 0 50px rgba(8, 145, 178, 0.1);
            background: #000;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Modern Buttons */
        .btn-modern {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-modern:active { transform: scale(0.95); }
        .btn-modern::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .btn-modern:hover::after { left: 100%; }

        /* Status Animations */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .alert-red { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen max-w-xl mx-auto">
    
    <header class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                SENTINEL V9
            </h1>
            <div class="flex items-center gap-2">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                <p id="status" class="text-[10px] uppercase tracking-widest text-slate-500">Initializing AI...</p>
            </div>
        </div>
        <button onclick="switchCamera()" class="p-3 glass rounded-2xl text-cyan-400 btn-modern">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
        </button>
    </header>

    <main class="flex-grow space-y-6">
        <div class="camera-container aspect-square md:aspect-video" id="cam-box">
            <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div class="glass p-1 rounded-2xl border border-slate-800">
                <select id="roomSelect" onchange="loadSpecificRoom()" 
                    class="w-full bg-transparent p-4 rounded-xl outline-none text-cyan-100 font-semibold appearance-none cursor-pointer">
                    <option value="" class="bg-slate-900 text-white">📂 เลือกห้องเรียนที่รับผิดชอบ...</option>
                </select>
            </div>

            <div id="activeControls" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="grid grid-cols-2 gap-3">
                    <div class="glass p-4 rounded-2xl flex flex-col justify-center border-l-4 border-cyan-500">
                        <span class="text-[10px] text-slate-500 uppercase font-bold">In Queue</span>
                        <span id="queueCount" class="text-3xl font-black text-cyan-400">0</span>
                    </div>
                    <button onclick="syncAttendance()" id="syncBtn" 
                        class="bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl font-black text-sm shadow-lg shadow-cyan-900/20 btn-modern">
                        บันทึกข้อมูล
                    </button>
                </div>
                
                <div class="flex gap-2 mt-3">
                    <button onclick="toggleAuto()" id="autoBtn" 
                        class="flex-1 glass p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest border-b-2 border-slate-700 transition-all">
                        Auto: OFF
                    </button>
                    <button onclick="openReg()" 
                        class="flex-1 glass p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-all">
                        ลงทะเบียนหน้า
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="regModal" class="fixed inset-0 z-50 hidden place-items-center p-6 bg-slate-950/80 backdrop-blur-md">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm border border-cyan-500/20 shadow-2xl">
            <h2 class="text-xl font-black mb-2 text-cyan-400">New Sentinel</h2>
            <p class="text-xs text-slate-500 mb-6">ลงทะเบียนอัตลักษณ์ใบหน้าใหม่</p>
            
            <select id="regStudent" class="w-full glass p-4 rounded-2xl mb-6 outline-none bg-slate-900"></select>
            
            <button id="saveBtn" onclick="doRegister()" 
                class="w-full bg-cyan-500 py-4 rounded-2xl font-black text-sm mb-3 btn-modern">
                ถ่ายภาพและบันทึก
            </button>
            <button onclick="document.getElementById('regModal').style.display='none'" 
                class="w-full text-slate-500 text-xs font-bold uppercase py-2">ยกเลิก</button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "URL_APPS_SCRIPT_ของคุณที่นี่"; 
        const API_KEY = "JUMJIM_SECURE_KEY_2024";

        let studentList = [];
        let faceData = [];
        let syncQueue = [];
        let isAutoSync = false;
        let currentFacingMode = 'user';

        async function init() {
            updateStatus("Loading Models...", "bg-yellow-500");
            const MODEL_URL = "https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights";
            
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);

            await startVideo();
            loadInitialData();
        }

        function updateStatus(text, dotClass) {
            document.getElementById('status').innerText = text;
            document.getElementById('status-dot').className = `w-2 h-2 rounded-full animate-pulse ${dotClass}`;
        }

        async function startVideo() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                const overlay = document.getElementById('overlay');
                faceapi.matchDimensions(overlay, { width: video.videoWidth, height: video.videoHeight });
                detectLoop();
            };
        }

        async function detectLoop() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const ctx = overlay.getContext('2d');
            const camBox = document.getElementById('cam-box');

            setInterval(async () => {
                if (video.paused || video.ended) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptors();

                const resizedDetections = faceapi.resizeResults(detections, { width: video.videoWidth, height: video.videoHeight });
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                let foundUnknown = false;

                resizedDetections.forEach(detection => {
                    let bestMatch = { distance: 0.45, student: null }; // Threshold 0.45

                    faceData.forEach(face => {
                        const dist = faceapi.euclideanDistance(detection.descriptor, new Float32Array(face.descriptor));
                        if (dist < bestMatch.distance) {
                            bestMatch = { distance: dist, student: studentList.find(s => s.student_id == face.student_id) };
                        }
                    });

                    const { x, y, width, height } = detection.detection.box;
                    
                    if (bestMatch.student) {
                        // GREEN FRAME: KNOWN
                        ctx.strokeStyle = '#22d3ee';
                        ctx.lineWidth = 4;
                        ctx.strokeRect(x, y, width, height);
                        ctx.fillStyle = '#22d3ee';
                        ctx.font = 'bold 16px Inter';
                        ctx.fillText(bestMatch.student.name, x, y - 10);
                        
                        if (!syncQueue.find(q => q.student_id === bestMatch.student.student_id)) {
                            syncQueue.push(bestMatch.student);
                            document.getElementById('queueCount').innerText = syncQueue.length;
                            speak(bestMatch.student.name);
                            if (isAutoSync) syncAttendance();
                        }
                    } else {
                        // RED FRAME: UNKNOWN
                        foundUnknown = true;
                        ctx.strokeStyle = '#ef4444';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]); // Dash line for unknown
                        ctx.strokeRect(x, y, width, height);
                        ctx.setLineDash([]);
                        ctx.fillStyle = '#ef4444';
                        ctx.font = 'bold 12px Inter';
                        ctx.fillText("UNKNOWN: PLEASE REGISTER", x, y - 10);
                    }
                });

                // Visual Alert on Camera Box
                if (foundUnknown) camBox.classList.add('alert-red');
                else camBox.classList.remove('alert-red');

            }, 600);
        }

        async function loadInitialData() {
            const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_initial_data`).then(r => r.json());
            const sel = document.getElementById('roomSelect');
            res.rooms.forEach(room => {
                const opt = document.createElement('option');
                opt.value = room; opt.text = "ห้อง " + room; opt.className = "bg-slate-900";
                sel.appendChild(opt);
            });
            updateStatus("Sentinel Ready", "bg-green-500");
        }

        async function loadSpecificRoom() {
            const room = document.getElementById('roomSelect').value;
            if(!room) return;
            updateStatus("Syncing Room Data...", "bg-cyan-500");
            const res = await fetch(`${APPS_SCRIPT_URL}?key=${API_KEY}&action=get_room_data&room=${encodeURIComponent(room)}`).then(r => r.json());
            studentList = res.studentList;
            faceData = res.faceData;
            
            document.getElementById('activeControls').classList.remove('hidden');
            const regSel = document.getElementById('regStudent');
            regSel.innerHTML = '';
            studentList.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.student_id; opt.text = s.name;
                regSel.appendChild(opt);
            });
            updateStatus(`Room ${room} Active`, "bg-green-500");
        }

        async function syncAttendance() {
            if (syncQueue.length === 0) return;
            const btn = document.getElementById('syncBtn');
            btn.innerText = "SYNCING...";
            btn.disabled = true;

            const records = [...syncQueue];
            syncQueue = [];
            document.getElementById('queueCount').innerText = "0";

            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ api_key: API_KEY, action: 'attendance_sync', records })
            });

            btn.innerText = "บันทึกข้อมูล";
            btn.disabled = false;
            speak("บันทึกสำเร็จ");
        }

        function toggleAuto() {
            isAutoSync = !isAutoSync;
            const btn = document.getElementById('autoBtn');
            btn.innerText = isAutoSync ? "Auto: ON" : "Auto: OFF";
            btn.classList.toggle('border-cyan-500');
            btn.classList.toggle('bg-cyan-500/10');
        }

        function switchCamera() {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startVideo();
        }

        function openReg() { document.getElementById('regModal').style.display='grid'; }
        
        async function doRegister() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "CAPTURING...";
            const id = document.getElementById('regStudent').value;
            const video = document.getElementById('video');
            const d = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if(!d) { alert("ไม่พบใบหน้า"); btn.disabled = false; return; }
            
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ api_key: API_KEY, action: 'register_face', student_id: id, descriptor: Array.from(d.descriptor) } )
            });
            alert("บันทึกหน้าสำเร็จ");
            loadSpecificRoom();
            document.getElementById('regModal').style.display='none';
            btn.disabled = false; btn.innerText = "ถ่ายภาพและบันทึก";
        }

        function speak(t) { 
            const m = new SpeechSynthesisUtterance(t); m.lang = 'th-TH'; window.speechSynthesis.speak(m); 
        }

        init();
    </script>
</body>
</html>
